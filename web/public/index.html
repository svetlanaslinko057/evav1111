        <!-- ===== THEME BOOTSTRAP — runs BEFORE any CSS paint to prevent FOUC.
             Reads localStorage user preference; falls back to OS prefers-color-scheme.
             Applies BOTH `<html class="theme-X">` and `<html class="X">` so palette.css
             selectors match either historical naming. Sets `color-scheme` for native UI
             (scrollbars, form controls) and `background` so the void between
             paint-commit and first React render uses the correct substrate hex
             from the design-system palette. ===== -->
        <script>
        (function () {
          try {
            var raw = localStorage.getItem('atlas_theme') || localStorage.getItem('atlas-theme');
            var theme = (raw === 'dark' || raw === 'light') ? raw : null;
            if (!theme && window.matchMedia) {
              theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            }
            theme = theme || 'dark';
            var root = document.documentElement;
            root.classList.add('theme-' + theme, theme);
            root.setAttribute('data-theme', theme);
            root.style.colorScheme = theme;
            root.style.backgroundColor = theme === 'light' ? '#FAF8F4' : '#0F0F11';
          } catch (_) { /* never block render */ }
        })();
        </script>

        <!-- ===== FONTS — connection warmup + non-blocking stylesheet.
             We preconnect to googleapis + gstatic (TLS handshake ahead of time),
             then load fonts with `display=swap` so any of them paints whichever
             arrives first. The print/onload swap pattern below makes the font
             stylesheet NON-render-blocking — text paints with the system fallback
             immediately, then re-renders when web fonts land. Big LCP win. ===== -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
        <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
        <link rel="preload"
              as="style"
              href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
              onload="this.onload=null;this.rel='stylesheet'" />
        <noscript>
          <link rel="stylesheet"
                href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />
        </noscript>

        <!-- ===== CHROME PERFORMANCESERVERTIMING ERROR FILTER =====
             Suppresses a Chromium dev-tools quirk that fires DataCloneError when
             devtools polls our session token — keeps console clean in production. -->
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
